<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const safeIcon = (name) => (LucideReact && LucideReact[name]) ? LucideReact[name] : () => null;
    const Tag = safeIcon('Tag');
    const Ticket = safeIcon('Ticket');
    const Hash = safeIcon('Hash');
    const Share2 = safeIcon('Share2');
    const Copy = safeIcon('Copy');
    const Check = safeIcon('Check');
    const ChevronDown = safeIcon('ChevronDown');
    const ChevronUp = safeIcon('ChevronUp');
    const Camera = safeIcon('Camera');
    const X = safeIcon('X');
    const CheckCircle = safeIcon('CheckCircle');
    const XCircle = safeIcon('XCircle');
    const RefreshCw = safeIcon('RefreshCw');
    const Users = safeIcon('Users');

    // ── Error Boundary ────────────────────────────────────────────────────────
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, info) { console.error('App crashed:', error, info); }
      render() {
        if (this.state.hasError) {
          return (
            <div style={{minHeight:'100vh',background:'#26241f',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px',color:'white',textAlign:'center'}}>
              <div style={{fontSize:'48px',marginBottom:'16px'}}>🎣</div>
              <h2 style={{fontSize:'20px',fontWeight:'bold',marginBottom:'8px'}}>Something went wrong</h2>
              <p style={{color:'rgba(255,255,255,0.6)',fontSize:'14px',marginBottom:'16px'}}>{this.state.error && this.state.error.message}</p>
              <button onClick={() => { this.setState({hasError:false,error:null}); window.location.reload(); }} style={{background:'#0097b2',color:'white',border:'none',borderRadius:'8px',padding:'10px 20px',cursor:'pointer',fontSize:'14px'}}>Reload App</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ── Constants ─────────────────────────────────────────────────────────────
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzBuiob4jDSUQAmcbxd7lrQ_JhuPCDnr8P4WlocCG3-Eu_FWQdDoDF-vnCHRwNqKA0wIw/exec';
    const LOGO_URL = 'https://voyagers-hook.github.io/images/logo%20trans.png';
    const ADMIN_EMAIL = 'info@voyagershook.com';
    const ADMIN_PASS = 'voyagershook';
    const MEMBERSHIPS_URL = 'https://www.voyagershook.com/memberships';

    // ── Default Challenges ────────────────────────────────────────────────────
    const DEFAULT_CHALLENGES = [
      { id: 'species-trio', title: 'The Species Trio', description: 'Catch any 3 of these 5 species in a single month: Perch, Pike, Tench, Bream, or Roach. Submit a photo of each catch.', icon: '\u{1F41F}', reward: { type: 'points', points: 500, description: '500 Points' }, criteria: ['Catch 3 different species from: Perch, Pike, Tench, Bream, Roach', 'All 3 must be caught within the same calendar month', 'Photo proof required for each catch'], active: true },
      { id: 'specimen-carp', title: 'Specimen Hunter: Carp', description: 'Land a Common or Mirror Carp weighing 10lb or over. A true specimen worth celebrating!', icon: '\u{1F3C6}', reward: { type: 'discount', discount: 10, description: '10% Off Next Order' }, criteria: ['Carp must weigh 10lb or more', 'Weight to be verified with scales in photo', 'Any water permitted'], active: true },
      { id: 'specimen-pike', title: 'Specimen Hunter: Pike', description: 'Catch a Pike of 15lb or more. The apex predator deserves a serious reward.', icon: '\u26A1', reward: { type: 'both', points: 200, discount: 15, description: '15% Off + 200 Points' }, criteria: ['Pike must weigh 15lb or more', 'Weight to be verified with scales in photo', 'Handle with care and return safely'], active: true },
      { id: 'specimen-tench', title: 'Specimen Hunter: Tench', description: 'A tench of 5lb or more — the "Doctor Fish" at its finest.', icon: '\u{1F33F}', reward: { type: 'points', points: 150, description: '150 Points' }, criteria: ['Tench must weigh 5lb or more', 'Photo proof required'], active: true },
      { id: 'local-legend', title: 'The Local Legend', description: 'Catch a target species from 3 different local waters. Show you know the area!', icon: '\u{1F4CD}', reward: { type: 'points', points: 400, description: '400 Points' }, criteria: ['Catch any species from 3 different named waters', 'Each water must be a different location', 'Submit one photo per water'], active: true },
      { id: 'big-catch', title: 'Big Catch of the Month', description: 'Submit your biggest catch of the month. The heaviest single fish wins top prize!', icon: '\u{1F3A3}', reward: { type: 'both', points: 500, discount: 15, description: '500 Points + 15% Off (Winner)' }, criteria: ['Submit your biggest single catch this month', 'Include weight and species', 'Heaviest fish at month end wins', 'All valid entries receive 100 points'], active: true },
      { id: 'seasonal-slam', title: 'The Seasonal Slam', description: 'Catch one target species each season across the full year. Complete all 4 for a massive reward!', icon: '\u{1F305}', reward: { type: 'both', points: 1000, discount: 20, description: '1000 Points + 20% Off (Full Year)' }, criteria: ['Spring: Catch a Tench', 'Summer: Catch a Carp', 'Autumn: Catch a Pike', 'Winter: Catch a Grayling', 'Photo proof required for each'], active: true },
      { id: 'gear-guru', title: 'Gear Guru Quiz', description: 'A monthly quiz about fishing techniques, gear, and local waters. First 5 members to get all answers right win!', icon: '\u2753', reward: { type: 'both', points: 100, discount: 5, description: '100 Points + 5% Off' }, criteria: ['Complete the monthly quiz', 'Achieve 100% correct answers', 'First 5 correct entries each month win'], active: true },
    ];

    // ── Photo Compression ─────────────────────────────────────────────────────
    function compressPhoto(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > 400) { h = h * 400 / w; w = 400; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.55));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ── Storage Utilities ─────────────────────────────────────────────────────
    const CHALLENGES_KEY = 'vh_challenges';
    function getChallenges() {
      const s = localStorage.getItem(CHALLENGES_KEY);
      if (!s) { localStorage.setItem(CHALLENGES_KEY, JSON.stringify(DEFAULT_CHALLENGES)); return DEFAULT_CHALLENGES; }
      const parsed = JSON.parse(s);
      if (!parsed || parsed.length === 0) { localStorage.setItem(CHALLENGES_KEY, JSON.stringify(DEFAULT_CHALLENGES)); return DEFAULT_CHALLENGES; }
      return parsed;
    }
    function saveChallenges(ch) { localStorage.setItem(CHALLENGES_KEY, JSON.stringify(ch)); }
    function getMemberStatus(email) {
      const s = localStorage.getItem('vh_status_' + email);
      return s ? JSON.parse(s) : [];
    }
    function saveMemberStatus(email, statuses) {
      localStorage.setItem('vh_status_' + email, JSON.stringify(statuses));
    }

    // ── GAS Helpers ───────────────────────────────────────────────────────────
    async function gasGet(params) {
      const url = GAS_URL + '?' + new URLSearchParams(params).toString();
      const r = await fetch(url, { redirect: 'follow' });
      return r.json();
    }
    async function gasPost(data) {
      const r = await fetch(GAS_URL, {
        method: 'POST',
        redirect: 'follow',
        body: JSON.stringify(data),
      });
      return r.json();
    }

    // ── ChallengeCard ─────────────────────────────────────────────────────────
    function ChallengeCard({ challenge, memberChallenge, onSubmit }) {
      const status = memberChallenge?.status ?? 'not_started';

      function statusBadge() {
        if (status === 'completed') return <span className="badge badge-success gap-1">&#x2705; Completed</span>;
        if (status === 'pending_approval') return <span className="badge badge-warning gap-1">&#x23F3; Pending Approval</span>;
        return <span className="badge badge-ghost gap-1">&#x1F3AF; Active</span>;
      }

      function rewardBadge() {
        const r = challenge.reward;
        if (r.type === 'points') return <span className="badge badge-info badge-sm">&#x2B50; {r.points} pts</span>;
        if (r.type === 'discount') return <span className="badge badge-secondary badge-sm">&#x1F3F7;&#xFE0F; {r.discount}% off</span>;
        return (
          <span className="flex gap-1">
            <span className="badge badge-info badge-sm">&#x2B50; {r.points} pts</span>
            <span className="badge badge-secondary badge-sm">&#x1F3F7;&#xFE0F; {r.discount}% off</span>
          </span>
        );
      }

      function cardBorderClass() {
        if (status === 'completed') return 'border-success border-2';
        if (status === 'pending_approval') return 'border-warning border-2';
        return 'border-base-200 border';
      }

      return (
        <div className={`card bg-base-100 shadow-sm rounded-xl ${cardBorderClass()} transition-all`}>
          <div className="card-body p-4">
            <div className="flex items-start justify-between gap-2">
              <div className="flex items-center gap-2 flex-1">
                <span className="text-3xl">{challenge.icon}</span>
                <div>
                  <h3 className="font-bold text-base leading-tight">{challenge.title}</h3>
                  <div className="mt-1">{rewardBadge()}</div>
                </div>
              </div>
              <div className="shrink-0">{statusBadge()}</div>
            </div>

            <p className="text-sm text-base-content/60 mt-2">{challenge.description}</p>

            <div className="mt-2">
              <p className="text-xs font-semibold text-base-content/40 uppercase tracking-wide mb-1">Requirements</p>
              <ul className="space-y-0.5">
                {challenge.criteria.map((c, i) => (
                  <li key={i} className="text-xs text-base-content/60 flex items-start gap-1.5">
                    <span className="opacity-40 mt-0.5">&bull;</span>
                    <span>{c}</span>
                  </li>
                ))}
              </ul>
            </div>

            {status === 'completed' && (
              <div className="mt-3 bg-success/10 rounded-lg p-2 text-center text-sm text-success font-medium">
                &#x1F389; Challenge Complete! Your reward has been applied.
              </div>
            )}

            {status === 'not_started' && (
              <div className="card-actions justify-end mt-3">
                <button className="btn brand-btn btn-sm" onClick={() => onSubmit(challenge)}>
                  Submit Catch
                </button>
              </div>
            )}

            {status === 'pending_approval' && (
              <div className="mt-3 bg-warning/10 rounded-lg p-2 text-center text-sm text-warning font-medium">
                &#x23F3; Waiting for admin to verify your submission.
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── ChallengeManager ──────────────────────────────────────────────────────
    function ChallengeManager({ challenges, onRefresh }) {
      const [editing, setEditing] = useState(null);
      const [isNew, setIsNew] = useState(false);

      function blankEdit() {
        return { id: 'c-' + Date.now(), title: '', description: '', icon: '\u{1F3A3}', criteria: [''], rewardType: 'points', points: 100, discount: 0, active: true };
      }

      function openEdit(challenge) {
        setIsNew(false);
        setEditing({
          id: challenge.id, title: challenge.title, description: challenge.description,
          icon: challenge.icon, criteria: [...challenge.criteria],
          rewardType: challenge.reward.type, points: challenge.reward.points ?? 0,
          discount: challenge.reward.discount ?? 0, active: challenge.active,
        });
      }

      function openNew() { setIsNew(true); setEditing(blankEdit()); }

      function toggleActive(challenge) {
        const all = getChallenges();
        const idx = all.findIndex(c => c.id === challenge.id);
        if (idx !== -1) { all[idx].active = !all[idx].active; saveChallenges(all); }
        onRefresh();
      }

      function deleteChallenge(id) {
        saveChallenges(getChallenges().filter(c => c.id !== id));
        onRefresh();
      }

      function saveEdit() {
        if (!editing || !editing.title.trim()) return;
        const reward = { type: editing.rewardType };
        if (editing.rewardType === 'points') { reward.points = editing.points; reward.description = editing.points + ' Points'; }
        else if (editing.rewardType === 'discount') { reward.discount = editing.discount; reward.description = editing.discount + '% Off'; }
        else { reward.points = editing.points; reward.discount = editing.discount; reward.description = editing.points + ' Points + ' + editing.discount + '% Off'; }

        const updated = {
          id: editing.id, title: editing.title, description: editing.description,
          icon: editing.icon, criteria: editing.criteria.filter(c => c.trim() !== ''),
          reward, active: editing.active,
        };

        const all = getChallenges();
        if (isNew) { all.push(updated); }
        else { const idx = all.findIndex(c => c.id === updated.id); if (idx !== -1) all[idx] = updated; }
        saveChallenges(all);
        setEditing(null);
        onRefresh();
      }

      function updateCriteria(i, val) {
        if (!editing) return;
        const c = [...editing.criteria]; c[i] = val;
        setEditing({ ...editing, criteria: c });
      }

      function removeCriteria(i) {
        if (!editing) return;
        setEditing({ ...editing, criteria: editing.criteria.filter((_, j) => j !== i) });
      }

      function addCriteria() {
        if (!editing) return;
        setEditing({ ...editing, criteria: [...editing.criteria, ''] });
      }

      return (
        <div className="space-y-3">
          <div className="flex justify-between items-center">
            <h2 className="font-semibold text-base-content">All Challenges ({challenges.length})</h2>
            <button className="btn brand-btn btn-sm" onClick={openNew}>+ New Challenge</button>
          </div>

          {challenges.map(ch => (
            <div key={ch.id} className={`card bg-base-100 border shadow-sm rounded-xl ${ch.active ? 'border-base-200' : 'border-base-300 opacity-60'}`}>
              <div className="card-body p-3">
                <div className="flex items-center gap-2">
                  <span className="text-2xl">{ch.icon}</span>
                  <div className="flex-1 min-w-0">
                    <h3 className="font-bold text-sm truncate">{ch.title}</h3>
                    <p className="text-xs text-base-content/60">{ch.reward.description}</p>
                  </div>
                  <div className="flex items-center gap-1 shrink-0">
                    <span className={`badge badge-sm ${ch.active ? 'badge-success' : 'badge-ghost'}`}>{ch.active ? 'Active' : 'Off'}</span>
                    <button className="btn btn-ghost btn-xs" title={ch.active ? 'Deactivate' : 'Activate'} onClick={() => toggleActive(ch)}>{ch.active ? '&#9646;' : '&#9654;'}</button>
                    <button className="btn btn-ghost btn-xs" title="Edit" onClick={() => openEdit(ch)}>&#x270F;&#xFE0F;</button>
                    <button className="btn btn-ghost btn-xs text-error" title="Delete" onClick={() => deleteChallenge(ch.id)}>&#x1F5D1;</button>
                  </div>
                </div>
              </div>
            </div>
          ))}

          {editing && (
            <div className="modal modal-open">
              <div className="modal-box max-w-lg max-h-[90vh] overflow-y-auto">
                <h3 className="font-bold text-lg mb-4">{isNew ? '\u2728 New Challenge' : '\u270F\uFE0F Edit Challenge'}</h3>
                <div className="space-y-3">
                  <div className="flex gap-2">
                    <div className="w-24">
                      <label className="label pb-0"><span className="label-text text-xs">Icon (emoji)</span></label>
                      <input className="input input-bordered w-full text-center text-xl" value={editing.icon} onChange={e => setEditing({ ...editing, icon: e.target.value })} />
                    </div>
                    <div className="flex-1">
                      <label className="label pb-0"><span className="label-text text-xs">Title *</span></label>
                      <input className="input input-bordered w-full" placeholder="e.g. Specimen Hunter: Carp" value={editing.title} onChange={e => setEditing({ ...editing, title: e.target.value })} />
                    </div>
                  </div>
                  <div>
                    <label className="label pb-0"><span className="label-text text-xs">Description</span></label>
                    <textarea className="textarea textarea-bordered w-full text-sm" rows={2} placeholder="Describe what members need to do..." value={editing.description} onChange={e => setEditing({ ...editing, description: e.target.value })} />
                  </div>
                  <div>
                    <label className="label pb-0"><span className="label-text text-xs">Requirements</span></label>
                    {editing.criteria.map((c, i) => (
                      <div key={i} className="flex gap-1 mb-1">
                        <input className="input input-bordered input-sm flex-1" placeholder={`Requirement ${i + 1}`} value={c} onChange={e => updateCriteria(i, e.target.value)} />
                        <button className="btn btn-ghost btn-sm text-error" onClick={() => removeCriteria(i)}>&times;</button>
                      </div>
                    ))}
                    <button className="btn btn-ghost btn-xs mt-1" onClick={addCriteria}>+ Add requirement</button>
                  </div>
                  <div>
                    <label className="label pb-0"><span className="label-text text-xs">Reward Type</span></label>
                    <select className="select select-bordered w-full" value={editing.rewardType} onChange={e => setEditing({ ...editing, rewardType: e.target.value })}>
                      <option value="points">Points only</option>
                      <option value="discount">Discount only</option>
                      <option value="both">Points + Discount</option>
                    </select>
                  </div>
                  {(editing.rewardType === 'points' || editing.rewardType === 'both') && (
                    <div>
                      <label className="label pb-0"><span className="label-text text-xs">Points awarded</span></label>
                      <input type="number" min={0} className="input input-bordered w-full" value={editing.points} onChange={e => setEditing({ ...editing, points: Number(e.target.value) })} />
                    </div>
                  )}
                  {(editing.rewardType === 'discount' || editing.rewardType === 'both') && (
                    <div>
                      <label className="label pb-0"><span className="label-text text-xs">Discount % awarded</span></label>
                      <input type="number" min={0} max={100} className="input input-bordered w-full" value={editing.discount} onChange={e => setEditing({ ...editing, discount: Number(e.target.value) })} />
                    </div>
                  )}
                  <div className="flex items-center gap-3 pt-1">
                    <input type="checkbox" className="toggle toggle-success" checked={editing.active} onChange={e => setEditing({ ...editing, active: e.target.checked })} />
                    <span className="text-sm">Active (visible to members)</span>
                  </div>
                </div>
                <div className="modal-action">
                  <button className="btn btn-ghost" onClick={() => setEditing(null)}>Cancel</button>
                  <button className="btn brand-btn" onClick={saveEdit} disabled={!editing.title.trim()}>Save Challenge</button>
                </div>
              </div>
              <div className="modal-backdrop" onClick={() => setEditing(null)} />
            </div>
          )}
        </div>
      );
    }

    // ── SubmitModal ───────────────────────────────────────────────────────────
    function SubmitModal({ challenge, member, onClose, onSubmitted }) {
      const [species, setSpecies] = useState('');
      const [weight, setWeight] = useState('');
      const [location, setLocation] = useState('');
      const [notes, setNotes] = useState('');
      const [photoData, setPhotoData] = useState('');
      const [photoName, setPhotoName] = useState('');
      const [submitted, setSubmitted] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const fileInputRef = useRef(null);

      async function handlePhotoChange(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        setPhotoName(file.name);
        const compressed = await compressPhoto(file);
        setPhotoData(compressed);
      }

      function removePhoto() {
        setPhotoData(''); setPhotoName('');
        if (fileInputRef.current) fileInputRef.current.value = '';
      }

      async function handleSubmit() {
        if (!species.trim()) return;
        setLoading(true);
        setError('');
        try {
          const combinedNotes = [
            species && 'Species: ' + species,
            weight && 'Weight: ' + weight + ' lbs',
            location && 'Location: ' + location,
            notes && 'Notes: ' + notes,
          ].filter(Boolean).join('\n');

          const result = await gasPost({
            action: 'submitChallenge',
            memberEmail: member.email,
            memberName: member.name,
            challengeId: challenge.id,
            challengeTitle: challenge.title,
            notes: combinedNotes,
            photo: photoData,
            points: challenge.reward.points || 0,
          });

          if (!result.success) throw new Error(result.error || 'Submission failed');

          const statuses = getMemberStatus(member.email);
          const existing = statuses.find(s => s.challengeId === challenge.id);
          if (existing) { existing.status = 'pending_approval'; existing.submissionId = result.id; }
          else { statuses.push({ challengeId: challenge.id, status: 'pending_approval', submissionId: result.id }); }
          saveMemberStatus(member.email, statuses);

          setSubmitted(true);
          setTimeout(() => { onSubmitted(); }, 1500);
        } catch(e) {
          console.error(e);
          setError('Failed to submit. Please try again.');
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="modal modal-open">
          <div className="modal-box max-w-md">
            {submitted ? (
              <div className="text-center py-6">
                <div className="text-5xl mb-3">&#x1F389;</div>
                <h3 className="text-xl font-bold text-success">Submission Received!</h3>
                <p className="text-base-content/60 mt-2">Your catch is pending admin approval. You'll earn your reward once verified.</p>
              </div>
            ) : (
              <>
                <h3 className="font-bold text-lg mb-1">{challenge.icon} Submit Your Catch</h3>
                <p className="text-sm text-base-content/50 mb-4">{challenge.title}</p>

                <div className="space-y-3">
                  <div>
                    <label className="label pb-1"><span className="label-text font-medium">Species <span className="text-error">*</span></span></label>
                    <input className="input input-bordered w-full input-sm" placeholder="e.g. Common Carp" value={species} onChange={e => setSpecies(e.target.value)} />
                  </div>
                  <div>
                    <label className="label pb-1"><span className="label-text font-medium">Weight (lbs)</span></label>
                    <input className="input input-bordered w-full input-sm" placeholder="e.g. 12.5" value={weight} onChange={e => setWeight(e.target.value)} />
                  </div>
                  <div>
                    <label className="label pb-1"><span className="label-text font-medium">Location / Water</span></label>
                    <input className="input input-bordered w-full input-sm" placeholder="e.g. Redmire Pool" value={location} onChange={e => setLocation(e.target.value)} />
                  </div>
                  <div>
                    <label className="label pb-1"><span className="label-text font-medium">Notes</span></label>
                    <textarea className="textarea textarea-bordered w-full textarea-sm" placeholder="Any additional details..." rows={2} value={notes} onChange={e => setNotes(e.target.value)} />
                  </div>

                  <div>
                    <label className="label pb-1"><span className="label-text font-medium">&#x1F4F8; Photo Proof</span></label>
                    {photoData ? (
                      <div className="relative">
                        <img src={photoData} alt="Catch photo" className="w-full rounded-lg max-h-48 object-cover" />
                        <button className="btn btn-circle btn-xs btn-error absolute top-2 right-2" onClick={removePhoto}>
                          <X size={12} />
                        </button>
                        <p className="text-xs text-base-content/40 mt-1 truncate">{photoName}</p>
                      </div>
                    ) : (
                      <button className="btn btn-outline btn-sm w-full gap-2" onClick={() => fileInputRef.current?.click()}>
                        <Camera size={16} /> Upload Photo
                      </button>
                    )}
                    <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={handlePhotoChange} />
                  </div>

                  {error && <p className="text-error text-sm">{error}</p>}
                </div>

                <div className="modal-action mt-4">
                  <button className="btn btn-ghost btn-sm" onClick={onClose} disabled={loading}>Cancel</button>
                  <button className="btn brand-btn btn-sm" onClick={handleSubmit} disabled={!species.trim() || loading}>
                    {loading ? <span className="loading loading-spinner loading-sm" /> : 'Submit Catch'}
                  </button>
                </div>
              </>
            )}
          </div>
          <div className="modal-backdrop" onClick={onClose} />
        </div>
      );
    }

    // ── MemberView ────────────────────────────────────────────────────────────
    function MemberView({ member: initialMember, challenges, onLogout }) {
      const [member, setMember] = useState(initialMember);
      const [selectedChallenge, setSelectedChallenge] = useState(null);
      const [copied, setCopied] = useState(false);
      const [referralOpen, setReferralOpen] = useState(false);

      async function refreshMember() {
        try {
          const data = await gasGet({ action: 'getMember', email: member.email });
          if (data.success) {
            setMember(prev => ({
              ...prev,
              points: data.pointsTotal,
              discountCode: data.discountCode || undefined,
              voucherCode: data.voucher || undefined,
              challenges: getMemberStatus(prev.email),
            }));
          } else {
            setMember(prev => ({ ...prev, challenges: getMemberStatus(prev.email) }));
          }
        } catch(e) {
          setMember(prev => ({ ...prev, challenges: getMemberStatus(prev.email) }));
        }
      }

      const refLink = (() => {
        try {
          const url = new URL(window.location.href);
          url.searchParams.delete('ref'); url.searchParams.delete('refname');
          url.searchParams.set('ref', member.memberNumber || member.id);
          url.searchParams.set('refname', member.name);
          return url.toString();
        } catch {
          return window.location.href + '?ref=' + encodeURIComponent(member.memberNumber || member.id) + '&refname=' + encodeURIComponent(member.name);
        }
      })();

      const shareMessage = `Hey! I thought you'd love Voyager's Hook fishing club — I'm a member and it's brilliant 🎣\n\nCheck out membership here: https://www.voyagershook.com/memberships\n\nUse my referral link to get started with the members area: ` + refLink;
      const whatsappUrl = 'https://wa.me/?text=' + encodeURIComponent(shareMessage);
      const emailUrl = `mailto:?subject=Join Voyager's Hook Fishing Club&body=` + encodeURIComponent(shareMessage);

      async function copyLink() {
        try { await navigator.clipboard.writeText(refLink); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch {}
      }

      const memberChallenges = member.challenges || [];
      const completed = memberChallenges.filter(c => c.status === 'completed').length;
      const pending = memberChallenges.filter(c => c.status === 'pending_approval').length;
      const progressPct = challenges.length > 0 ? Math.round((completed / challenges.length) * 100) : 0;

      return (
        <div className="min-h-screen bg-base-200">
          <div className="brand-header-bg text-white px-4 py-5">
            <div className="flex items-center justify-between max-w-xl mx-auto">
              <div className="flex items-center gap-3">
                <img src={LOGO_URL} alt="Voyager's Hook" className="h-10 object-contain" />
                <div>
                  <p className="text-white/60 text-xs">Welcome back,</p>
                  <h1 className="text-lg font-bold leading-tight">{member.name}</h1>
                  {member.memberNumber && (
                    <p className="text-white/50 text-xs flex items-center gap-1">
                      <Hash size={10} /> Member #{member.memberNumber}
                    </p>
                  )}
                </div>
              </div>
              <button className="btn btn-ghost btn-sm text-white opacity-80 hover:opacity-100" onClick={onLogout}>Logout</button>
            </div>

            <div className="mt-4 max-w-xl mx-auto grid grid-cols-3 gap-3">
              <div className="bg-white/10 rounded-xl p-3 text-center">
                <div className="text-2xl font-bold brand-text-teal">{member.points}</div>
                <div className="text-xs text-white/60">Points</div>
              </div>
              <div className="bg-white/10 rounded-xl p-3 text-center">
                <div className="text-2xl font-bold">{completed}</div>
                <div className="text-xs text-white/60">Completed</div>
              </div>
              <div className="bg-white/10 rounded-xl p-3 text-center">
                <div className="text-2xl font-bold">{pending}</div>
                <div className="text-xs text-white/60">Pending</div>
              </div>
            </div>

            <div className="mt-4 max-w-xl mx-auto">
              <div className="flex justify-between text-xs text-white/60 mb-1">
                <span>Challenge Progress</span>
                <span>{completed} / {challenges.length} completed</span>
              </div>
              <div className="w-full bg-white/20 rounded-full h-2">
                <div className="h-2 rounded-full transition-all" style={{ width: progressPct + '%', backgroundColor: '#0097b2' }} />
              </div>
            </div>
          </div>

          {(member.discountCode || member.voucherCode) && (
            <div className="max-w-xl mx-auto px-4 pt-4 space-y-2">
              <h2 className="text-sm font-semibold text-base-content/70 uppercase tracking-wide">&#x1F381; Your Rewards</h2>
              {member.discountCode && (
                <div className="bg-base-100 rounded-xl p-3 flex items-center gap-3 border border-base-300">
                  <div className="brand-text-teal"><Tag size={18} /></div>
                  <div className="flex-1">
                    <p className="text-xs text-base-content/60">Discount Code</p>
                    <p className="font-bold tracking-wider text-base-content">{member.discountCode}</p>
                  </div>
                  <span className="badge badge-success badge-sm">Active</span>
                </div>
              )}
              {member.voucherCode && (
                <div className="bg-base-100 rounded-xl p-3 flex items-center gap-3 border border-base-300">
                  <div className="brand-text-teal"><Ticket size={18} /></div>
                  <div className="flex-1">
                    <p className="text-xs text-base-content/60">Voucher Code</p>
                    <p className="font-bold tracking-wider text-base-content">{member.voucherCode}</p>
                  </div>
                  <span className="badge badge-warning badge-sm">Voucher</span>
                </div>
              )}
            </div>
          )}

          <div className="max-w-xl mx-auto px-4 pt-3">
            <button
              className="w-full flex items-center justify-between px-3 py-2 rounded-xl text-sm text-base-content/50 hover:text-base-content/70 hover:bg-base-200 transition-colors"
              onClick={() => setReferralOpen(o => !o)}
            >
              <span className="flex items-center gap-2">
                <Share2 size={13} />
                Refer a friend &amp; earn 100 points
              </span>
              {referralOpen ? <ChevronUp size={13} /> : <ChevronDown size={13} />}
            </button>

            {referralOpen && (
              <div className="mt-2 bg-base-100 rounded-xl p-3 border border-base-300 space-y-3">
                <p className="text-xs text-base-content/50">Share your unique link — when a friend joins you'll earn 100 points automatically.</p>
                <div className="bg-base-200 rounded-lg px-3 py-2 flex items-center gap-2">
                  <span className="text-xs text-base-content/40 flex-1 truncate font-mono">{refLink}</span>
                  <button className="btn btn-ghost btn-xs shrink-0" onClick={copyLink} title="Copy link">
                    {copied ? <Check size={13} className="text-success" /> : <Copy size={13} />}
                  </button>
                </div>
                {copied && <p className="text-xs text-success text-center">&#x2713; Copied!</p>}
                <div className="grid grid-cols-2 gap-2">
                  <a href={whatsappUrl} target="_blank" rel="noopener noreferrer"
                    className="btn btn-xs text-white border-0 hover:opacity-90"
                    style={{ backgroundColor: '#25D366' }}>
                    &#x1F4F1; WhatsApp
                  </a>
                  <a href={emailUrl} className="btn btn-xs btn-outline">&#x2709;&#xFE0F; Email</a>
                </div>
              </div>
            )}
          </div>

          <div className="max-w-xl mx-auto px-4 py-5 space-y-3">
            <h2 className="text-base font-semibold text-base-content">&#x1F3AF; Active Challenges</h2>
            {challenges.filter(c => c.active).map(challenge => {
              const mc = memberChallenges.find(c => c.challengeId === challenge.id);
              return (
                <div key={challenge.id}>
                  <ChallengeCard challenge={challenge} memberChallenge={mc} onSubmit={setSelectedChallenge} />
                </div>
              );
            })}
          </div>

          {selectedChallenge && (
            <SubmitModal
              challenge={selectedChallenge}
              member={member}
              onClose={() => setSelectedChallenge(null)}
              onSubmitted={() => { setSelectedChallenge(null); refreshMember(); }}
            />
          )}
        </div>
      );
    }

    // ── Login ─────────────────────────────────────────────────────────────────
    function Login({ onMemberLogin, onAdminLogin }) {
      const urlParams = new URLSearchParams(window.location.search);
      const refMemberNum = urlParams.get('ref') || '';
      const refName = urlParams.get('refname') || '';

      const [tab, setTab] = useState('member');
      const [email, setEmail] = useState('');
      const [adminEmail, setAdminEmail] = useState('');
      const [adminPass, setAdminPass] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const [nonMemberWithReferral, setNonMemberWithReferral] = useState(false);
      const [referralLogged, setReferralLogged] = useState(false);

      async function logReferralToSheet(referredEmail) {
        try {
          await gasPost({ action: 'logReferral', referrerMemberNumber: refMemberNum, referrerName: refName, newMemberEmail: referredEmail });
        } catch(err) { console.error('Failed to log referral:', err); }
      }

      async function handleMemberLogin() {
        if (!email.trim()) { setError('Please enter your email address.'); return; }
        setLoading(true); setError(''); setNonMemberWithReferral(false);
        try {
          const data = await gasGet({ action: 'getMember', email: email.trim() });
          if (!data.success) {
            if (refMemberNum) {
              setNonMemberWithReferral(true);
              if (!referralLogged) { await logReferralToSheet(email.trim()); setReferralLogged(true); }
            } else {
              setError(data.error || 'No member found with that email address. Please check your email and try again.');
            }
            return;
          }

          const member = {
            id: data.memberNumber || data.email,
            name: data.name,
            email: data.email,
            memberNumber: data.memberNumber,
            points: data.pointsTotal,
            discountCode: data.discountCode && data.discountCode !== '-' ? data.discountCode : undefined,
            voucherCode: data.voucher && data.voucher !== '-' ? data.voucher : undefined,
            challenges: getMemberStatus(data.email),
            sheetRow: data.rowIndex,
          };

          onMemberLogin(member);
        } catch(err) {
          console.error(err);
          setError('Could not connect to the member database. Please try again.');
        } finally {
          setLoading(false);
        }
      }

      function handleAdminLogin() {
        if (adminEmail.toLowerCase() === ADMIN_EMAIL && adminPass === ADMIN_PASS) {
          onAdminLogin();
        } else {
          setError('Incorrect email or password.');
        }
      }

      return (
        <div className="min-h-screen brand-login-bg flex flex-col items-center justify-center p-4">
          <div className="mb-6 text-center">
            <img src={LOGO_URL} alt="Voyager's Hook" className="h-24 mx-auto mb-3 object-contain" />
            <h1 className="text-2xl font-bold text-white">Members Challenge Tracker</h1>
            <p className="text-white/60 mt-1">Catch. Submit. Earn Rewards.</p>
          </div>

          {refMemberNum && !nonMemberWithReferral && (
            <div className="mb-4 rounded-xl px-4 py-3 text-center text-white max-w-sm w-full" style={{ backgroundColor: 'rgba(0,151,178,0.25)', border: '1px solid rgba(0,151,178,0.5)' }}>
              <p className="text-sm font-semibold">&#x1F465; You've been referred by {refName || 'a member'}!</p>
              <p className="text-xs text-white/70 mt-1">Log in below, or sign up to join the club.</p>
            </div>
          )}

          <div className="bg-base-100 rounded-2xl shadow-2xl w-full max-w-sm p-6">
            <div className="tabs tabs-boxed mb-5">
              <button className={`tab flex-1 ${tab === 'member' ? 'tab-active' : ''}`}
                onClick={() => { setTab('member'); setError(''); setNonMemberWithReferral(false); }}>
                Member Login
              </button>
              <button className={`tab flex-1 ${tab === 'admin' ? 'tab-active' : ''}`}
                onClick={() => { setTab('admin'); setError(''); setNonMemberWithReferral(false); }}>
                Admin
              </button>
            </div>

            {tab === 'member' ? (
              <div className="space-y-4">
                {nonMemberWithReferral ? (
                  <div className="text-center">
                    <div className="text-4xl mb-3">&#x1F3A3;</div>
                    <h3 className="font-bold text-base mb-1">Not a member yet?</h3>
                    <p className="text-sm text-base-content/60 mb-4">
                      {refName ? refName + ' thinks' : 'Someone thinks'} you'd love Voyager's Hook! Sign up to start earning points and taking on challenges.
                    </p>
                    <a href={MEMBERSHIPS_URL} target="_blank" rel="noopener noreferrer" className="btn brand-btn w-full mb-3">
                      Join Voyager's Hook &#x2192;
                    </a>
                    <p className="text-xs text-base-content/40">
                      We've noted your referral — we'll add your bonus points once you join! &#x1F389;
                    </p>
                    <button className="btn btn-ghost btn-xs mt-3 text-base-content/40" onClick={() => setNonMemberWithReferral(false)}>
                      Already a member? Try again
                    </button>
                  </div>
                ) : (
                  <>
                    <div>
                      <label className="label"><span className="label-text font-medium">Your Email Address</span></label>
                      <input
                        type="email"
                        className="input input-bordered w-full"
                        placeholder="Enter your email"
                        value={email}
                        onChange={e => { setEmail(e.target.value); setError(''); }}
                        onKeyDown={e => e.key === 'Enter' && handleMemberLogin()}
                        disabled={loading}
                      />
                    </div>
                    {error && <p className="text-error text-sm">{error}</p>}
                    <button className="btn brand-btn w-full" onClick={handleMemberLogin} disabled={loading}>
                      {loading ? <span className="loading loading-spinner loading-sm" /> : 'View My Challenges'}
                    </button>
                  </>
                )}
              </div>
            ) : (
              <div className="space-y-4">
                <div>
                  <label className="label"><span className="label-text font-medium">Admin Email</span></label>
                  <input type="email" className="input input-bordered w-full" placeholder="Enter admin email" value={adminEmail} onChange={e => { setAdminEmail(e.target.value); setError(''); }} />
                </div>
                <div>
                  <label className="label"><span className="label-text font-medium">Password</span></label>
                  <input type="password" className="input input-bordered w-full" placeholder="Enter password" value={adminPass} onChange={e => { setAdminPass(e.target.value); setError(''); }} onKeyDown={e => e.key === 'Enter' && handleAdminLogin()} />
                </div>
                {error && <p className="text-error text-sm">{error}</p>}
                <button className="btn btn-neutral w-full" onClick={handleAdminLogin}>Admin Login</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── AdminView ─────────────────────────────────────────────────────────────
    function AdminView({ challenges, onLogout, onRefresh }) {
      const [tab, setTab] = useState('pending');
      const [submissions, setSubmissions] = useState([]);
      const [referrals, setReferrals] = useState([]);
      const [loading, setLoading] = useState(false);
      const [sheetUpdateStatus, setSheetUpdateStatus] = useState({});
      const [referralAwardStatus, setReferralAwardStatus] = useState({});
      const [expandedPhoto, setExpandedPhoto] = useState(null);

      const pending = submissions.filter(s => s.status === 'pending');
      const history = submissions.filter(s => s.status !== 'pending');
      const pendingReferrals = referrals.filter(r => r.status === 'pending');

      async function loadData() {
        setLoading(true);
        try {
          const data = await gasGet({ action: 'getAdminData' });
          setSubmissions(data.submissions || []);
          setReferrals(data.referrals || []);
        } catch(e) { console.error(e); }
        setLoading(false);
      }

      useEffect(() => { loadData(); }, []);

      async function approveSubmission(sub) {
        const challenge = challenges.find(c => c.id === sub.challengeId);
        setSheetUpdateStatus(prev => ({ ...prev, [sub.id]: 'updating' }));
        try {
          await gasPost({
            action: 'approveSubmission',
            submissionId: sub.id,
            memberEmail: sub.memberEmail,
            points: challenge?.reward?.points || sub.points || 0,
          });
          const statuses = getMemberStatus(sub.memberEmail);
          const idx = statuses.findIndex(s => s.challengeId === sub.challengeId);
          if (idx !== -1) statuses[idx].status = 'completed';
          saveMemberStatus(sub.memberEmail, statuses);
          setSheetUpdateStatus(prev => ({ ...prev, [sub.id]: 'done' }));
          await loadData();
        } catch(e) {
          setSheetUpdateStatus(prev => ({ ...prev, [sub.id]: 'failed' }));
        }
      }

      async function rejectSubmission(sub) {
        await gasPost({ action: 'rejectSubmission', submissionId: sub.id });
        const statuses = getMemberStatus(sub.memberEmail);
        const idx = statuses.findIndex(s => s.challengeId === sub.challengeId);
        if (idx !== -1) statuses[idx].status = 'not_started';
        saveMemberStatus(sub.memberEmail, statuses);
        await loadData();
      }

      async function awardReferral(referral) {
        const key = referral.referredEmail + '_' + referral.row;
        setReferralAwardStatus(prev => ({ ...prev, [key]: 'updating' }));
        try {
          await gasPost({ action: 'awardReferralPoints', row: referral.row, referrerMemberNumber: referral.referrerMemberNumber });
          setReferralAwardStatus(prev => ({ ...prev, [key]: 'done' }));
          await loadData();
        } catch(e) {
          setReferralAwardStatus(prev => ({ ...prev, [key]: 'failed' }));
        }
      }

      function formatDate(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      }

      return (
        <div className="min-h-screen bg-base-200">
          <div className="brand-header-bg text-white px-4 py-5">
            <div className="flex items-center justify-between max-w-2xl mx-auto">
              <div>
                <p className="text-white/50 text-sm">Admin Dashboard</p>
                <h1 className="text-xl font-bold">&#x1F3A3; Challenge Manager</h1>
              </div>
              <div className="flex items-center gap-2">
                <button className="btn btn-ghost btn-sm text-white opacity-80" onClick={loadData} disabled={loading}>
                  <RefreshCw size={14} className={loading ? 'animate-spin' : ''} />
                </button>
                <button className="btn btn-ghost btn-sm text-white opacity-80" onClick={onLogout}>Logout</button>
              </div>
            </div>
            <div className="mt-4 max-w-2xl mx-auto grid grid-cols-3 gap-3">
              <div className="bg-white/10 rounded-xl p-3 text-center">
                <div className="text-2xl font-bold text-warning">{pending.length}</div>
                <div className="text-xs text-white/60">Pending Reviews</div>
              </div>
              <div className="bg-white/10 rounded-xl p-3 text-center">
                <div className="text-2xl font-bold">{submissions.length}</div>
                <div className="text-xs text-white/60">Total Submissions</div>
              </div>
              <div className="bg-white/10 rounded-xl p-3 text-center">
                <div className="text-2xl font-bold brand-text-teal">{history.filter(s => s.status === 'approved').length}</div>
                <div className="text-xs text-white/60">Approved</div>
              </div>
            </div>
          </div>

          <div className="max-w-2xl mx-auto px-4 pt-4">
            <div className="tabs tabs-boxed bg-base-300 overflow-x-auto flex-nowrap gap-0">
              <button className={`tab text-xs whitespace-nowrap ${tab === 'pending' ? 'tab-active' : ''}`} onClick={() => setTab('pending')}>
                Pending {pending.length > 0 && <span className="badge badge-error badge-sm ml-1">{pending.length}</span>}
              </button>
              <button className={`tab text-xs whitespace-nowrap ${tab === 'members' ? 'tab-active' : ''}`} onClick={() => setTab('members')}>Members</button>
              <button className={`tab text-xs whitespace-nowrap ${tab === 'history' ? 'tab-active' : ''}`} onClick={() => setTab('history')}>History</button>
              <button className={`tab text-xs whitespace-nowrap ${tab === 'challenges' ? 'tab-active' : ''}`} onClick={() => setTab('challenges')}>Challenges</button>
              <button className={`tab text-xs whitespace-nowrap ${tab === 'referrals' ? 'tab-active' : ''}`} onClick={() => setTab('referrals')}>
                Referrals {pendingReferrals.length > 0 && <span className="badge badge-warning badge-sm ml-1">{pendingReferrals.length}</span>}
              </button>
            </div>
          </div>

          <div className="max-w-2xl mx-auto px-4 py-4 space-y-3">

            {tab === 'pending' && (
              <>
                {loading ? (
                  <div className="text-center py-12"><span className="loading loading-spinner loading-md" /></div>
                ) : pending.length === 0 ? (
                  <div className="text-center py-12 text-base-content/40">
                    <div className="text-4xl mb-2">&#x2705;</div>
                    <p>No pending submissions — all caught up!</p>
                  </div>
                ) : (
                  pending.map(sub => {
                    const challenge = challenges.find(c => c.id === sub.challengeId);
                    const sheetStatus = sheetUpdateStatus[sub.id];
                    return (
                      <div key={sub.id} className="card bg-base-100 border border-warning shadow-sm rounded-xl">
                        <div className="card-body p-4">
                          <div className="flex items-start justify-between">
                            <div>
                              <h3 className="font-bold">{challenge?.icon} {sub.challengeTitle}</h3>
                              <p className="text-sm text-base-content/50">by <span className="font-medium text-base-content">{sub.memberName}</span> · {formatDate(sub.timestamp)}</p>
                            </div>
                            <span className="badge badge-warning">Pending</span>
                          </div>

                          {sub.notes && (
                            <div className="mt-2 bg-base-200 rounded p-2 text-sm">
                              <span className="text-base-content/50">Notes:</span>
                              <pre className="font-medium whitespace-pre-wrap mt-1 text-xs">{sub.notes}</pre>
                            </div>
                          )}

                          {sub.photo && (
                            <div className="mt-2">
                              <p className="text-xs text-base-content/40 mb-1">&#x1F4F8; Photo proof:</p>
                              <img
                                src={sub.photo}
                                alt="Catch photo"
                                className="w-full rounded-lg max-h-56 object-cover cursor-pointer hover:opacity-90 transition-opacity"
                                onClick={() => setExpandedPhoto(sub.photo)}
                              />
                            </div>
                          )}

                          {challenge?.reward && (
                            <p className="text-xs text-base-content/40 mt-1">Reward on approval: {challenge.reward.description}</p>
                          )}

                          {sheetStatus === 'updating' && (
                            <div className="flex items-center gap-2 text-xs text-base-content/50 mt-1">
                              <RefreshCw size={12} className="animate-spin" /> Updating Google Sheets...
                            </div>
                          )}
                          {sheetStatus === 'done' && (
                            <div className="flex items-center gap-2 text-xs text-success mt-1">
                              <CheckCircle size={12} /> Points updated in Google Sheets &#x2713;
                            </div>
                          )}
                          {sheetStatus === 'failed' && (
                            <div className="flex items-center gap-2 text-xs text-error mt-1">
                              <XCircle size={12} /> Sheet update failed — please update manually
                            </div>
                          )}

                          <div className="flex gap-2 mt-3">
                            <button className="btn brand-btn btn-sm flex-1" onClick={() => approveSubmission(sub)} disabled={sheetStatus === 'updating'}>
                              &#x2705; Approve &amp; Award
                            </button>
                            <button className="btn btn-error btn-outline btn-sm flex-1" onClick={() => rejectSubmission(sub)}>
                              &#x274C; Reject
                            </button>
                          </div>
                        </div>
                      </div>
                    );
                  })
                )}
              </>
            )}

            {tab === 'members' && (
              <div className="card bg-base-100 border border-base-200 shadow-sm rounded-xl">
                <div className="card-body p-6 text-center">
                  <div className="text-4xl mb-3">&#x1F4CA;</div>
                  <h3 className="font-bold text-lg mb-2">Member Data</h3>
                  <p className="text-base-content/60 mb-4">Member data is managed in your Google Sheet. Visit the sheet to view and manage members directly.</p>
                  <a
                    href="https://docs.google.com/spreadsheets/d/1loWRLLaoJyeRrK8YwJqCQPeIyZ5EGLByr7_D2b5qgUY"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="btn brand-btn"
                  >
                    Open Google Sheet &#x2192;
                  </a>
                </div>
              </div>
            )}

            {tab === 'history' && (
              <>
                {loading ? (
                  <div className="text-center py-12"><span className="loading loading-spinner loading-md" /></div>
                ) : history.length === 0 ? (
                  <div className="text-center py-12 text-base-content/40">
                    <div className="text-4xl mb-2">&#x1F4CB;</div>
                    <p>No reviewed submissions yet.</p>
                  </div>
                ) : (
                  history.map(sub => (
                    <div key={sub.id} className={`card bg-base-100 shadow-sm rounded-xl border ${sub.status === 'approved' ? 'border-success' : 'border-error'}`}>
                      <div className="card-body p-4">
                        <div className="flex justify-between items-start">
                          <div>
                            <h3 className="font-semibold text-sm">{sub.challengeTitle}</h3>
                            <p className="text-xs text-base-content/40">{sub.memberName} · {formatDate(sub.timestamp)}</p>
                            {sub.notes && <p className="text-xs mt-1 text-base-content/60 truncate">{sub.notes}</p>}
                          </div>
                          <span className={`badge ${sub.status === 'approved' ? 'badge-success' : 'badge-error'}`}>
                            {sub.status === 'approved' ? '&#x2705; Approved' : '&#x274C; Rejected'}
                          </span>
                        </div>
                        {sub.photo && (
                          <img
                            src={sub.photo}
                            alt="Catch photo"
                            className="mt-2 w-full rounded-lg max-h-32 object-cover cursor-pointer hover:opacity-90"
                            onClick={() => setExpandedPhoto(sub.photo)}
                          />
                        )}
                      </div>
                    </div>
                  ))
                )}
              </>
            )}

            {tab === 'challenges' && (
              <ChallengeManager challenges={challenges} onRefresh={onRefresh} />
            )}

            {tab === 'referrals' && (
              <>
                <div className="flex items-center justify-between mb-1">
                  <h2 className="font-semibold text-base flex items-center gap-2">
                    <Users size={16} className="brand-text-teal" /> Referral Tracker
                  </h2>
                  <button className="btn btn-ghost btn-xs" onClick={loadData} disabled={loading}>
                    <RefreshCw size={12} className={loading ? 'animate-spin' : ''} />
                  </button>
                </div>
                <p className="text-xs text-base-content/50 mb-3">
                  When a member's friend joins, click "Award 100 pts" to credit the referrer automatically.
                </p>

                {loading ? (
                  <div className="text-center py-12">
                    <span className="loading loading-spinner loading-md" />
                    <p className="text-sm text-base-content/40 mt-2">Loading referrals...</p>
                  </div>
                ) : referrals.length === 0 ? (
                  <div className="text-center py-12 text-base-content/40">
                    <div className="text-4xl mb-2">&#x1F465;</div>
                    <p className="font-medium">No referrals yet</p>
                    <p className="text-sm mt-1">Referrals will appear here when members share their links.</p>
                  </div>
                ) : (
                  <>
                    {pendingReferrals.length > 0 && (
                      <div className="mb-2">
                        <p className="text-xs font-semibold text-warning uppercase tracking-wide mb-2">&#x23F3; Awaiting Award</p>
                        {pendingReferrals.map((ref, i) => {
                          const key = ref.referredEmail + '_' + ref.row;
                          const awardStatus = referralAwardStatus[key];
                          return (
                            <div key={i} className="card bg-base-100 border border-warning shadow-sm rounded-xl mb-2">
                              <div className="card-body p-4">
                                <div className="flex items-start justify-between">
                                  <div>
                                    <p className="font-semibold text-sm">{ref.referredEmail}</p>
                                    <p className="text-xs text-base-content/50 mt-0.5">
                                      Referred by <span className="font-medium text-base-content">{ref.referrerName}</span>
                                      {ref.referrerMemberNumber && <span className="text-base-content/40"> (#{ref.referrerMemberNumber})</span>}
                                    </p>
                                    <p className="text-xs text-base-content/40 mt-0.5">{formatDate(ref.timestamp)}</p>
                                  </div>
                                  <span className="badge badge-warning badge-sm">Pending</span>
                                </div>

                                {awardStatus === 'updating' && (
                                  <div className="flex items-center gap-2 text-xs text-base-content/50 mt-2">
                                    <RefreshCw size={12} className="animate-spin" /> Awarding points...
                                  </div>
                                )}
                                {awardStatus === 'done' && (
                                  <div className="flex items-center gap-2 text-xs text-success mt-2">
                                    <CheckCircle size={12} /> 100 pts awarded &#x2713;
                                  </div>
                                )}
                                {awardStatus === 'failed' && (
                                  <div className="flex items-center gap-2 text-xs text-error mt-2">
                                    <XCircle size={12} /> Failed — check member number is correct
                                  </div>
                                )}

                                <button
                                  className="btn brand-btn btn-sm w-full mt-3"
                                  onClick={() => awardReferral(ref)}
                                  disabled={awardStatus === 'updating' || awardStatus === 'done'}
                                >
                                  &#x1F389; Award 100 pts to {ref.referrerName || 'referrer'}
                                </button>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {referrals.filter(r => r.status === 'awarded').length > 0 && (
                      <div>
                        <p className="text-xs font-semibold text-success uppercase tracking-wide mb-2">&#x2705; Awarded</p>
                        {referrals.filter(r => r.status === 'awarded').map((ref, i) => (
                          <div key={i} className="card bg-base-100 border border-success shadow-sm rounded-xl mb-2 opacity-75">
                            <div className="card-body p-3">
                              <div className="flex items-center justify-between">
                                <div>
                                  <p className="font-semibold text-sm">{ref.referredEmail}</p>
                                  <p className="text-xs text-base-content/50">
                                    Referred by <span className="font-medium">{ref.referrerName}</span>
                                    {ref.referrerMemberNumber && <span className="text-base-content/40"> (#{ref.referrerMemberNumber})</span>}
                                  </p>
                                  <p className="text-xs text-base-content/40">{formatDate(ref.timestamp)}</p>
                                </div>
                                <span className="badge badge-success badge-sm">+100 pts</span>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </>
                )}
              </>
            )}
          </div>

          {expandedPhoto && (
            <div className="modal modal-open" onClick={() => setExpandedPhoto(null)}>
              <div className="modal-box max-w-2xl p-2 bg-base-300">
                <img src={expandedPhoto} alt="Catch photo full size" className="w-full rounded-lg" />
                <p className="text-xs text-center text-base-content/40 mt-2">Tap anywhere to close</p>
              </div>
              <div className="modal-backdrop" />
            </div>
          )}
        </div>
      );
    }

    // ── BottomNav ─────────────────────────────────────────────────────────────
    function BottomNav({ activeTab, onTabChange }) {
      const tabs = [
        { id: 'challenges', label: 'Challenges', icon: '\u{1F3A3}' },
        { id: 'website', label: 'Website', icon: '\u{1F310}', url: 'https://www.voyagershook.com' },
        { id: 'offers', label: 'Offers', icon: '\u{1F3F7}\uFE0F', url: 'https://www.voyagershook.com/members-exclusive-offers' },
        { id: 'facebook', label: 'Facebook', icon: '\u{1F4D8}', url: 'https://www.facebook.com/profile.php?id=61573745438430' },
      ];
      return (
        <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: '#26241f', zIndex: 1000, display: 'flex', borderTop: '1px solid #444' }}>
          {tabs.map(tab => (
            <button
              key={tab.id}
              onClick={() => tab.url ? window.open(tab.url, '_blank') : onTabChange(tab.id)}
              style={{
                flex: 1, padding: '8px 4px 12px', display: 'flex', flexDirection: 'column',
                alignItems: 'center', gap: '2px', background: 'none', border: 'none', cursor: 'pointer',
                color: activeTab === tab.id ? '#0097b2' : '#aaa', fontSize: '11px', fontWeight: activeTab === tab.id ? '600' : '400'
              }}
            >
              <span style={{ fontSize: '20px' }}>{tab.icon}</span>
              <span>{tab.label}</span>
            </button>
          ))}
        </div>
      );
    }

    // ── App Root ──────────────────────────────────────────────────────────────
    function App() {
      const [view, setView] = useState('login');
      const [currentMember, setCurrentMember] = useState(null);
      const [challenges, setChallenges] = useState(getChallenges());
      const [activeTab, setActiveTab] = useState('challenges');

      function refreshChallenges() { setChallenges(getChallenges()); }

      function handleTabChange(tab) { setActiveTab(tab); }

      return (
        <div className="font-sans" style={{ paddingBottom: '70px' }}>
          {view === 'login' && (
            <Login
              onMemberLogin={(m) => { setCurrentMember(m); setView('member'); }}
              onAdminLogin={() => setView('admin')}
            />
          )}
          {view === 'member' && currentMember && (
            <MemberView
              member={currentMember}
              challenges={challenges}
              onLogout={() => { setCurrentMember(null); setView('login'); }}
            />
          )}
          {view === 'admin' && (
            <AdminView
              challenges={challenges}
              onLogout={() => setView('login')}
              onRefresh={refreshChallenges}
            />
          )}
          <BottomNav activeTab={activeTab} onTabChange={handleTabChange} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
